<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venkatesh Srinivasan</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=IM+Fell+English:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark: #0b0b0c;
  --ink: #e8e8e8;
  --fade: #8a8a8f;
}

body {
  background: var(--bg-dark);
  color: var(--ink);
  font-family: 'IM Fell English', serif;
  overflow-x: hidden;
}

/* Background gradient */
.sakura-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, #1a1a1f 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, #141418 0%, transparent 60%),
    var(--bg-dark);
}

/* ONI + SAMURAI */
.oni-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 260px;
  opacity: 0.06;
  z-index: 1;
  pointer-events: none;
}

.samurai-bg {
  position: fixed;
  bottom: 0;
  right: 0;
  width: 260px;
  opacity: 0.06;
  z-index: 1;
  pointer-events: none;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  background: rgba(10,10,12,0.6);
  backdrop-filter: blur(10px);
}

.nav-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--fade);
}

/* HERO */
.hero {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero-name {
  font-size: clamp(2.5rem, 6vw, 3.5rem);
  margin-bottom: 1rem;
}

.hero-bio {
  color: var(--fade);
  font-size: 1rem;
}

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: #666;
}

/* SECTION */
section {
  position: relative;
  z-index: 10;
  padding: 4rem 2rem;
}

.section-inner {
  max-width: 500px;
  margin: auto;
}

/* LINKS */
.link-row {
  display: flex;
  justify-content: space-between;
  padding: 1.2rem 0;
  border-bottom: 1px solid #1f1f22;
  text-decoration: none;
  color: inherit;
}

.link-name {
  font-size: 1.2rem;
}

.link-desc {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--fade);
}

.link-arrow {
  color: #555;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 3rem;
  color: #555;
}

</style>
</head>

<body>

<div class="sakura-bg"></div>

<!-- ONI + SAMURAI -->
<img src="images/oni.png" class="oni-bg">
<img src="images/samurai.png" class="samurai-bg">

<nav>
  <span class="nav-name">Venkatesh Srinivasan</span>
</nav>

<div class="hero">

  <h1 class="hero-name">Exploring</h1>

  <p class="hero-bio">
    Finance · AI · Philosophy · Art
  </p>

  <p class="hero-sub">探求</p>

</div>

<section>
  <div class="section-inner">

    <a class="link-row" href="https://your-substack-link">
      <div>
        <div class="link-name">Writing</div>
        <div class="link-desc">Substack</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-row" href="#">
      <div>
        <div class="link-name">Projects</div>
        <div class="link-desc">Work & builds</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-row" href="#">
      <div>
        <div class="link-name">Notes</div>
        <div class="link-desc">Thinking & ideas</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>
</section>

<footer>
  <p>探求し続ける</p>
</footer>

</body>
</html>
