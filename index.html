<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venkatesh Srinivasan</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=IM+Fell+English:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink-deep: #8b3a5a;
  --pink-mid: #c4687e;
  --pink-light: #f2b8c6;
  --pink-pale: #fde8ef;
  --ink: #1a0a10;
  --fade: #7a4a58;
}
html { scroll-behavior: smooth; }
body {
  background: var(--pink-pale);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  overflow-x: hidden;
  min-height: 100vh;
}
.sakura-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(ellipse at 20% 20%, #f9c8d8 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, #f5aec4 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, #fde8ef 0%, #f7c0d0 100%);
}
.petals-layer {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  width: 100%;
  height: 100%;
}
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.25rem 3rem;
  background: rgba(253,232,239,0.75);
  backdrop-filter: blur(16px);
  border-bottom: 0.5px solid rgba(139,58,90,0.12);
}
.nav-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fade);
}
.hero {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 6rem 2rem 4rem;
}
.musashi-frame {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px solid rgba(139,58,90,0.2);
  margin-bottom: 2rem;
  background: #1e0e14;
  box-shadow: 0 0 0 8px rgba(242,184,198,0.25), 0 0 0 16px rgba(242,184,198,0.08);
}
.musashi-frame svg { width: 100%; height: 100%; }
.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--pink-deep);
  margin-bottom: 0.75rem;
}
.hero-name {
  font-family: 'IM Fell English', serif;
  font-size: clamp(2.2rem, 6vw, 3.8rem);
  font-weight: 400;
  line-height: 1.08;
  color: var(--ink);
  margin-bottom: 1rem;
}
.hero-divider {
  width: 2rem;
  height: 0.5px;
  background: var(--pink-mid);
  margin: 0 auto 1.5rem;
}
.hero-bio {
  font-size: 1rem;
  line-height: 1.9;
  color: var(--fade);
  font-style: italic;
  margin-bottom: 0.5rem;
}
.hero-sub {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.85rem;
  font-weight: 300;
  color: rgba(139,58,90,0.45);
  letter-spacing: 0.12em;
}
.scroll-cue {
  margin-top: 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}
.scroll-cue span {
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(139,58,90,0.35);
}
.scroll-line {
  width: 0.5px;
  height: 3rem;
  background: linear-gradient(to bottom, rgba(139,58,90,0.35), transparent);
  animation: grow 2s ease-in-out infinite;
}
section {
  position: relative;
  z-index: 10;
  padding: 6rem 2rem;
}
.section-inner {
  max-width: 520px;
  margin: 0 auto;
}
.section-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--pink-deep);
  margin-bottom: 0.75rem;
}
.section-title {
  font-family: 'IM Fell English', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 400;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 2rem;
}
.about-text {
  font-size: 1.05rem;
  line-height: 1.95;
  color: var(--fade);
  font-style: italic;
}
.links-list {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.link-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.4rem 0;
  border-bottom: 0.5px solid rgba(139,58,90,0.12);
  text-decoration: none;
  color: inherit;
  transition: all 0.2s;
}
.link-row:first-child { border-top: 0.5px solid rgba(139,58,90,0.12); }
.link-row:hover .link-name { color: var(--pink-deep); }
.link-row:hover .link-arrow { transform: translateX(5px); color: var(--pink-deep); }
.link-left { display: flex; flex-direction: column; gap: 0.2rem; }
.link-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--pink-deep);
}
.link-name {
  font-family: 'IM Fell English', serif;
  font-size: 1.2rem;
  color: var(--ink);
  transition: color 0.2s;
}
.link-desc {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  color: var(--fade);
  letter-spacing: 0.03em;
}
.link-arrow {
  font-size: 1rem;
  color: var(--pink-mid);
  transition: all 0.2s;
}
footer {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 3rem 2rem;
  border-top: 0.5px solid rgba(139,58,90,0.08);
}
.footer-kanji {
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  font-weight: 300;
  color: rgba(139,58,90,0.25);
  letter-spacing: 0.4em;
  margin-bottom: 0.4rem;
}
.footer-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.52rem;
  color: rgba(139,58,90,0.3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
@keyframes grow {
  0%, 100% { height: 2rem; opacity: 0.4; }
  50% { height: 3.5rem; opacity: 0.8; }
}
@media (max-width: 640px) {
  nav { padding: 1.25rem 1.5rem; }
  section { padding: 4rem 1.5rem; }
}
</style>
</head>
<body>

<div class="sakura-bg"></div>

<svg class="petals-layer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="none">
  <ellipse cx="120" cy="50" rx="14" ry="8" fill="#e8a0b8" transform="rotate(-20 120 50)">
    <animateTransform attributeName="transform" type="translate" values="0,-50; 30,950" dur="8s" repeatCount="indefinite" additive="sum"/>
    <animate attributeName="opacity" values="0;0.7;0.5;0" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="350" cy="0" rx="12" ry="7" fill="#d48898" transform="rotate(15 350 0)">
    <animateTransform attributeName="transform" type="translate" values="0,-30; -20,950" dur="10s" repeatCount="indefinite" begin="2s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0" dur="10s" repeatCount="indefinite" begin="2s"/>
  </ellipse>
  <ellipse cx="600" cy="20" rx="13" ry="7" fill="#f0b0c4" transform="rotate(-10 600 20)">
    <animateTransform attributeName="transform" type="translate" values="0,-20; 15,950" dur="9s" repeatCount="indefinite" begin="4s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.65;0.4;0" dur="9s" repeatCount="indefinite" begin="4s"/>
  </ellipse>
  <ellipse cx="900" cy="10" rx="11" ry="6" fill="#e8a0b8" transform="rotate(25 900 10)">
    <animateTransform attributeName="transform" type="translate" values="0,-40; -25,950" dur="11s" repeatCount="indefinite" begin="1s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.55;0.35;0" dur="11s" repeatCount="indefinite" begin="1s"/>
  </ellipse>
  <ellipse cx="1150" cy="30" rx="12" ry="7" fill="#d48898" transform="rotate(-30 1150 30)">
    <animateTransform attributeName="transform" type="translate" values="0,-30; 10,950" dur="7s" repeatCount="indefinite" begin="3s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.6;0.4;0" dur="7s" repeatCount="indefinite" begin="3s"/>
  </ellipse>
  <ellipse cx="780" cy="0" rx="11" ry="6" fill="#d48898" transform="rotate(20 780 0)">
    <animateTransform attributeName="transform" type="translate" values="0,-20; -10,950" dur="10.5s" repeatCount="indefinite" begin="7s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.55;0.35;0" dur="10.5s" repeatCount="indefinite" begin="7s"/>
  </ellipse>
  <ellipse cx="240" cy="0" rx="9" ry="5" fill="#e8a0b8" transform="rotate(-15 240 0)">
    <animateTransform attributeName="transform" type="translate" values="0,-10; 20,950" dur="9.5s" repeatCount="indefinite" begin="6s" additive="sum"/>
    <animate attributeName="opacity" values="0;0.5;0.3;0" dur="9.5s" repeatCount="indefinite" begin="6s"/>
  </ellipse>
</svg>

<nav>
  <span class="nav-name">Venkatesh Srinivasan</span>
</nav>

<div class="hero">
  <div class="musashi-frame">
    <svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="160" fill="#1e0e14"/>
      <ellipse cx="80" cy="80" rx="80" ry="80" fill="#2a1218"/>
      <ellipse cx="55" cy="65" rx="45" ry="55" fill="#1a0c10" opacity="0.4"/>
      <path d="M25 160 Q35 115 45 100 Q58 82 80 80 Q102 82 115 100 Q125 115 135 160Z" fill="#0d0608"/>
      <path d="M45 100 Q58 86 80 84 L80 160 Z" fill="#150a0e"/>
      <path d="M80 84 Q102 86 115 100 L80 160 Z" fill="#0d0608"/>
      <path d="M67 98 Q80 108 93 98 L80 84 Z" fill="#1a0e12"/>
      <rect x="71" y="70" width="18" height="16" rx="4" fill="#3a2020"/>
      <ellipse cx="80" cy="55" rx="30" ry="34" fill="#3a2020"/>
      <ellipse cx="80" cy="58" rx="24" ry="27" fill="#2e1818"/>
      <ellipse cx="70" cy="55" rx="5" ry="3.5" fill="#1a0a08"/>
      <ellipse cx="90" cy="55" rx="5" ry="3.5" fill="#1a0a08"/>
      <ellipse cx="70.5" cy="55" rx="2.5" ry="2.5" fill="#0a0404"/>
      <ellipse cx="90.5" cy="55" rx="2.5" ry="2.5" fill="#0a0404"/>
      <circle cx="71" cy="54" r="0.8" fill="rgba(255,240,220,0.4)"/>
      <circle cx="91" cy="54" r="0.8" fill="rgba(255,240,220,0.4)"/>
      <path d="M64 49 Q70 47 76 48" stroke="#1a0a08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M84 48 Q90 47 96 49" stroke="#1a0a08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M77 61 Q75 67 80 70 Q85 67 83 61" stroke="#241010" stroke-width="1" fill="none"/>
      <path d="M72 76 Q80 79 88 76" stroke="#1e0e10" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M50 48 Q48 30 55 18 Q67 5 80 3 Q93 5 105 18 Q112 30 110 48" fill="#0d0608"/>
      <path d="M54 45 Q52 30 60 18 Q71 8 80 6 Q89 8 100 18 Q108 30 106 45" fill="#150a0e"/>
      <ellipse cx="80" cy="10" rx="10" ry="6" fill="#0d0608"/>
      <ellipse cx="80" cy="7" rx="6" ry="4" fill="#150a0e"/>
      <rect x="74" y="13" width="12" height="3" rx="1.5" fill="#1e1008"/>
      <path d="M50 52 Q44 58 46 70 Q49 63 55 60" fill="#0d0608"/>
      <path d="M110 52 Q116 58 114 70 Q111 63 105 60" fill="#0d0608"/>
      <ellipse cx="80" cy="80" rx="78" ry="78" fill="none" stroke="#0d0608" stroke-width="6" opacity="0.7"/>
    </svg>
  </div>

  <p class="hero-eyebrow">Venkatesh Srinivasan</p>
  <h1 class="hero-name">Explorative<br><em>Human.</em></h1>
  <div class="hero-divider"></div>
  <p class="hero-bio">I am exploring.</p>
  <p class="hero-sub">探求する人間</p>

  <div class="scroll-cue">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</div>

<section>
  <div class="section-inner">
    <div class="links-list">
      <a class="link-row" href="#">
        <div class="link-left">
          <span class="link-label">Writing</span>
          <span class="link-name">Substack</span>
          <span class="link-desc">Notes, essays and thoughts</span>
        </div>
        <span class="link-arrow">&#x2192;</span>
      </a>
      <a class="link-row" href="#">
        <div class="link-left">
          <span class="link-label">Work</span>
          <span class="link-name">Projects</span>
          <span class="link-desc">Things I have built</span>
        </div>
        <span class="link-arrow">&#x2192;</span>
      </a>
      <a class="link-row" href="#">
        <div class="link-left">
          <span class="link-label">Thinking</span>
          <span class="link-name">Notes</span>
          <span class="link-desc">What I am learning and exploring</span>
        </div>
        <span class="link-arrow">&#x2192;</span>
      </a>
    </div>
  </div>
</section>

<footer>
  <p class="footer-kanji">今日も探求</p>
  <p class="footer-name">Venkatesh Srinivasan</p>
</footer>

</body>
</html>
