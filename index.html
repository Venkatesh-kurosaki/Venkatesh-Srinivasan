<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venkatesh Srinivasan</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=IM+Fell+English:ital@0;1&family=Space+Mono&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #e8e8e8;
  --fade: #aaaaaa;
}

body {
  background: #000;
  color: var(--ink);
  font-family: 'IM Fell English', serif;
  overflow-x: hidden;
}

/* 🔥 BACKGROUND IMAGE */
.sakura-bg {
  position: fixed;
  inset: 0;
  z-index: 0;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("./images/Oni%20vs%20Samurai%20cyber%20duel.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.nav-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--fade);
}

/* HERO */
.hero {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}

.hero-name {
  font-size: clamp(2.5rem, 6vw, 3.5rem);
  margin-bottom: 1rem;
}

.hero-bio {
  font-size: 1rem;
  color: var(--fade);
}

.hero-sub {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  color: #777;
}

/* SECTION */
section {
  position: relative;
  z-index: 10;
  padding: 4rem 2rem;
}

.section-inner {
  max-width: 500px;
  margin: auto;
}

/* LINKS */
.link-row {
  display: flex;
  justify-content: space-between;
  padding: 1.2rem 0;
  border-bottom: 1px solid #222;
  text-decoration: none;
  color: inherit;
}

.link-name {
  font-size: 1.2rem;
}

.link-desc {
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--fade);
}

.link-arrow {
  color: #666;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 3rem;
  color: #666;
}
</style>
</head>

<body>

<!-- 🔥 BACKGROUND -->
<div class="sakura-bg"></div>

<!-- NAV -->
<nav>
  <span class="nav-name">Venkatesh Srinivasan</span>
</nav>

<!-- HERO -->
<div class="hero">
  <h1 class="hero-name">Exploring</h1>

  <p class="hero-bio">
    Finance · AI · Philosophy · Art
  </p>

  <p class="hero-sub">探求</p>
</div>

<!-- LINKS -->
<section>
  <div class="section-inner">

    <a class="link-row" href="https://your-substack-link">
      <div>
        <div class="link-name">Writing</div>
        <div class="link-desc">Substack</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-row" href="#">
      <div>
        <div class="link-name">Projects</div>
        <div class="link-desc">Work & builds</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-row" href="#">
      <div>
        <div class="link-name">Notes</div>
        <div class="link-desc">Thinking & ideas</div>
      </div>
      <span class="link-arrow">→</span>
    </a>

  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>探求し続ける</p>
</footer>

</body>
</html>
