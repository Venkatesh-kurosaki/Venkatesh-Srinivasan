<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venkatesh Srinivasan</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400&family=Space+Mono&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --white:#ffffff;
  --black:#0a0a0a;
  --muted:#a1a1a1;
  --line:#e8e8e6;
}

/* Base */
html{scroll-behavior:smooth;font-size:16px;}

body{
  background:var(--black);
  color:var(--white);
  font-family:'Inter',sans-serif;
  font-weight:300;
  overflow-x:hidden;
}

/* Selection */
::selection{background:var(--white);color:var(--black);}

/* ─── LOADER ─── */
.loader{
  position:fixed;
  inset:0;
  background:var(--black);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity .6s ease, visibility .6s ease;
}
.loader.hide{opacity:0;visibility:hidden;}

.loader-text{
  font-family:'Space Mono',monospace;
  font-size:.7rem;
  letter-spacing:.25em;
  text-transform:uppercase;
}

.loader-text span{
  display:inline-block;
  transform:translateY(100%);
  animation:slideUp .6s cubic-bezier(.16,1,.3,1) forwards;
}
.loader-text span:nth-child(1){animation-delay:.1s;}
.loader-text span:nth-child(2){animation-delay:.2s;}
.loader-text span:nth-child(3){animation-delay:.3s;}
.loader-text span:nth-child(4){animation-delay:.4s;}

.loader-bar{
  width:120px;
  height:1px;
  background:rgba(255,255,255,.2);
  margin-top:1.5rem;
  position:relative;
  overflow:hidden;
}
.loader-bar::after{
  content:'';
  position:absolute;
  top:0;left:0;
  height:100%;
  background:var(--white);
  width:0%;
  animation:loadBar 1.6s ease forwards;
}

/* ─── HERO ─── */
.hero{
  min-height:100vh;
  display:flex;
  align-items:flex-end;
  padding:0 8vw 6rem;
}

.hero-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(4rem,10vw,10rem);
  line-height:.9;
}

/* Reveal */
.reveal{display:block;overflow:hidden;}
.reveal span{
  display:block;
  transform:translateY(110%);
}

/* ─── SECTION ─── */
.sec{
  padding:6rem 8vw;
  border-top:1px solid var(--line);
}

.sec h2{
  font-family:'Playfair Display',serif;
  font-size:2rem;
  margin-bottom:2rem;
}

/* Portfolio */
.p-item{
  display:block;
  padding:1.5rem 0;
  border-bottom:1px solid var(--line);
  text-decoration:none;
  color:var(--white);
  transition:transform .4s cubic-bezier(.16,1,.3,1);
}
.p-item:hover{transform:translateX(10px);}

/* Animations */
@keyframes slideUp{
  from{transform:translateY(100%);}
  to{transform:translateY(0);}
}
@keyframes loadBar{
  from{width:0;}
  to{width:100%;}
}
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-text">
    <span>Venkatesh</span>
    <span>Srinivasan</span>
    <span>Portfolio</span>
    <span>Loading</span>
  </div>
  <div class="loader-bar"></div>
</div>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-name">
    <span class="reveal"><span>Venkatesh</span></span>
    <span class="reveal"><span>Srinivasan.</span></span>
  </h1>
</section>

<!-- ABOUT -->
<section class="sec">
  <h2 class="sr">About</h2>
  <p class="sr">
    Chartered Accountant working on systems thinking, finance and AI.
    Focused on second-order effects and building intelligent tools.
  </p>
</section>

<!-- PORTFOLIO -->
<section class="sec">
  <h2 class="sr">Portfolio</h2>

  <a class="p-item sr" href="https://huggingface.co/" target="_blank">
    FDD AI Toolkit
  </a>

  <a class="p-item sr" href="#">
    VenkyDoesDD
  </a>

  <a class="p-item sr" href="#">
    First Principles Ponder
  </a>

</section>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<!-- Lenis Smooth Scroll -->
<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.35/bundled/lenis.min.js"></script>

<script>
/* Loader */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").classList.add("hide");
  }, 1500);
});

/* Smooth scroll */
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* GSAP */
gsap.registerPlugin(ScrollTrigger);

/* Hero reveal */
gsap.to(".reveal span", {
  y: "0%",
  duration: 1,
  stagger: 0.12,
  ease: "power4.out",
  delay: 0.6
});

/* Scroll reveal */
gsap.utils.toArray(".sr").forEach((el,i)=>{
  gsap.from(el,{
    y:60,
    opacity:0,
    duration:1,
    ease:"power3.out",
    delay:i*0.05,
    scrollTrigger:{
      trigger:el,
      start:"top 85%"
    }
  });
});
</script>

</body>
</html>
